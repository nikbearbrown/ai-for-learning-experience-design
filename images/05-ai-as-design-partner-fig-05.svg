  <title id="ch5-fig05-title">Buy Verbs, Not Magic</title>
  <desc id="ch5-fig05-desc">Two registers contrast tool scopes. Above: three small narrow tools each map one-to-one to a single artifact with clean parallel arrows. Below: one broad generator fans out toward a full screen whose outline is drawn with gaps marked by open circles — plausible-looking output that is incomplete where it looks complete.</desc>
