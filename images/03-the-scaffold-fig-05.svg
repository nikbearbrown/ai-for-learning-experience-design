  <desc>Zero-anchored dot plot: Tutor CoPilot raised topic mastery +4 percentage points overall and +9 points for students of the lowest-rated tutors (ring-marked subgroup). Inset contrasts the usual gap-widening pattern with this floor-lifting result — schematic context, not study data.</desc>
