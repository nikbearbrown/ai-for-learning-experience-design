  <text x="32" y="440" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Only the two-axis view exposes the hazard cell: accepting a correct answer is the wrong move when struggle was the point.</text>
