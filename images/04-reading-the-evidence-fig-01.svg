  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text class="t" x="32" y="32">The Evidence-State Map: Twenty Causal Studies Inside Eight Hundred</text>

  <!-- field label -->
  <text class="l" x="64" y="70">800+ studies of AI in K-12 education</text>
  <text class="s" x="64" y="258">each square = 1 study</text>

  <!-- waffle grid: 40 x 20 cells, 8px pitch -->
  <rect x="64" y="80" width="320" height="160" fill="url(#cellField)"/>
