<!-- AI for Learning Experience Design · Chapter 4 · Figure 1 — The Evidence-State Map · 2026-06-07 -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ch4-fig01-title ch4-fig01-desc">
  <title id="ch4-fig01-title">The Evidence-State Map: Twenty Causal Studies Inside Eight Hundred</title>
  <desc id="ch4-fig01-desc">A waffle grid of 800 small squares, each representing one study of AI in K-12 education. Twenty squares clustered in the lower-right corner are highlighted in red, representing the roughly twenty studies that rigorously measure causal impact. A magnified inset at right enlarges the twenty highlighted squares.</desc>
  <metadata xmlns:cajal="https://cajal.org/ns/figure"><cajal:figure book="AI for Learning Experience Design" book-slug="ai-for-learning-experience-design" chapter="4" figure-number="1" title="The Evidence-State Map: Twenty Causal Studies Inside Eight Hundred" slug="evidence-state-map" type="proportional-unit-chart" priority="critical" author="Nik Bear Brown" date="2026-06-07" source-file="pantry/04-reading-the-evidence-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
    <pattern id="cellField" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="7" height="7" fill="#D4D4D4"/></pattern>
    <pattern id="cellCore" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="7" height="7" fill="#C8102E"/></pattern>
