  <text class="l" x="436" y="84">the causal core, magnified</text>
  <rect x="436" y="92" width="160" height="132" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="456" y="108" width="116" height="92" fill="url(#cellCoreBig)"/>
  <text class="m" x="436" y="244">~20 of 800</text>
  <text class="s" x="436" y="260">rigorously measure causal impact</text>

  <!-- numerics -->
  <text class="m" x="64" y="290">800+ studies</text>
  <text class="m" x="436" y="290">~20 causal &#8776; 2.5%</text>

  <text class="src" x="32" y="346">STANFORD SCALE 2026 &#183; AS REPORTED IN CHAPTER 4</text>
  <text class="s" x="32" y="372">Each square is one study. Of 800+ academic studies of AI in K-12 education, roughly twenty rigorously measure causal</text>
  <text class="s" x="32" y="387">impact &#8212; about 2.5%. The repository has since passed 1,100 papers without the causal core growing proportionally</text>
  <text class="s" x="32" y="402">(repository count as of publication; not drawn).</text>
