<svg xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.press/ns/figure" viewBox="0 0 700 420" role="img" aria-labelledby="ch10-fig04-title ch10-fig04-desc" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif">
  <title id="ch10-fig04-title">Detection Fails in Both Directions</title>
  <desc id="ch10-fig04-desc">Zero-anchored horizontal bar chart with two bars on a shared scale: 94 percent of AI-written exam submissions passed undetected (Scarfe et al. 2024), and 61.3 percent of human-written non-native TOEFL essays were falsely flagged as AI (Liang et al. 2023). Hairline frames mark 100 percent behind each bar.</desc>
  <metadata>
    <cajal:figure chapter="10" figure="4" slug="detection-both-directions" type="zero-anchored-bar-chart" rank="medium-high" class="PQ" concept="Verified detector failure rates in both directions: misses and false accusations" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07"/>
  </metadata>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="64" y="30" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Figure 10.4 · Detection fails in both directions</text>

  <!-- plot region -->
  <rect x="250" y="80" width="400" height="180" fill="#F5F5F5" stroke="#F5F5F5" stroke-width="0.75"/>

  <!-- 100% reference frames -->
  <rect x="250" y="96" width="400" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="250" y="188" width="400" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>

  <!-- bars (both are failures: no red — near-monochrome) -->
  <rect x="250" y="96" width="376" height="44" fill="#2a1a0e"/>
  <rect x="250" y="188" width="245.2" height="44" fill="#787878"/>

  <!-- zero baseline -->
  <line x1="250" y1="80" x2="250" y2="260" stroke="#2a1a0e" stroke-width="1.5"/>

  <!-- values (mono) -->
  <text x="634" y="122" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">94%</text>
  <text x="503" y="214" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">61.3%</text>

  <!-- scale -->
  <line x1="250" y1="260" x2="250" y2="266" stroke="#787878" stroke-width="1"/>
  <line x1="450" y1="260" x2="450" y2="266" stroke="#787878" stroke-width="1"/>
  <line x1="650" y1="260" x2="650" y2="266" stroke="#787878" stroke-width="1"/>
  <text x="250" y="280" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#787878" text-anchor="middle">0</text>
  <text x="450" y="280" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#787878" text-anchor="middle">50</text>
  <text x="650" y="280" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#787878" text-anchor="middle">100</text>

  <!-- row labels -->
  <text x="238" y="112" font-size="12" fill="#2a1a0e" text-anchor="end">AI-written exams</text>
  <text x="238" y="128" font-size="12" fill="#2a1a0e" text-anchor="end">passed undetected</text>
  <text x="238" y="144" font-size="10" fill="#787878" text-anchor="end" letter-spacing="0.5">SCARFE ET AL. 2024</text>
  <text x="238" y="204" font-size="12" fill="#2a1a0e" text-anchor="end">human essays falsely</text>
  <text x="238" y="220" font-size="12" fill="#2a1a0e" text-anchor="end">flagged as AI</text>
  <text x="238" y="236" font-size="10" fill="#787878" text-anchor="end" letter-spacing="0.5">LIANG ET AL. 2023</text>

  <!-- caption -->
  <text x="64" y="320" font-size="11" fill="#545454">Two directions of detector failure, from two studies with different populations and denominators — real exam</text>
  <text x="64" y="336" font-size="11" fill="#545454">submissions vs. non-native TOEFL essays across seven detectors: compare direction, not magnitude. Turnitin's</text>
  <text x="64" y="352" font-size="11" fill="#545454">~15% miss rate is a vendor claim, omitted as unverified; per-module grade margins excluded pending verification.</text>
  <text x="64" y="378" font-size="10" fill="#787878" letter-spacing="0.5">SCARFE ET AL. 2024, PLOS ONE (READING) · LIANG ET AL. 2023, PATTERNS (TOEFL, SEVEN DETECTORS)</text>
</svg>
