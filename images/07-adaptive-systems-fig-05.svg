<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch7-fig5-title ch7-fig5-desc">
  <title id="ch7-fig5-title">Distance from the classroom (ordinal — heights are rank, not magnitude)</title>
  <desc id="ch7-fig5-desc">Four lollipop markers at descending ordinal heights above a zero baseline: controlled studies highest (solid, verified), year-two at scale lower (open, verify-flagged), WWC weighted barely above the line (open, verify-flagged), and year-one resting on the zero baseline (null). An arrow beneath marks increasing distance from controlled study to real deployment. Heights signal rank only; all numeric values live in the caption with their verification flags.</desc>
