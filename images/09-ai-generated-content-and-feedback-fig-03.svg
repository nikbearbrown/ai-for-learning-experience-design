<!-- AI for Learning Experience Design | Ch.9 AI-Generated Content and Feedback | Figure 3 | Two dashboards, one module | Nik Bear Brown | 2026-06-07 -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch9-fig3-title ch9-fig3-desc">
  <title id="ch9-fig3-title">Two dashboards, one module</title>
  <desc id="ch9-fig3-desc">Two-panel paired-trace schematic, directional only and not to scale. Left panel: quiz-performance traces for human-instructor and AI-instructor video braid into near-coincidence — indistinguishable. Right panel: engagement traces start together, then the AI-instructor trace sags to a visibly lower terminal point — significantly lower. IRRODL 2024, n=108; no magnitudes are depicted.</desc>
  <metadata>
    <cajal:figure chapter="09" number="3" file="09-ai-generated-content-and-feedback-fig-03.svg" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07" type="two-panel-paired-trace-schematic" rank="High" concept="Perception/performance split: equal quiz performance, significantly lower engagement for AI-presented video" source-status="direction-only rendering; study reports direction and significance, not magnitudes — not to scale"/>
  </metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="64" y="30" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Two dashboards, one module</text>

  <!-- legend -->
  <line x1="64" y1="80" x2="92" y2="80" stroke="#2a1a0e" stroke-width="2"/>
