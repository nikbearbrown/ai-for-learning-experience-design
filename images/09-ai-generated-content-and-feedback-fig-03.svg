  <text x="64" y="358" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" letter-spacing="0.05em" fill="#545454">SOURCE: IRRODL 2024 &#183; N = 108 &#183; DIRECTION AND SIGNIFICANCE ONLY</text>

  <!-- caption -->
  <text x="64" y="384" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Directional rendering — not to scale. The study reports direction and significance, not magnitudes: quiz performance</text>
  <text x="64" y="398" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">was indistinguishable between AI-presented and human-presented video; engagement was significantly lower for AI.</text>
