  <text x="286" y="84" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">AI instructor</text>

  <!-- panel titles -->
  <text x="205" y="112" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">quiz performance &#183; indistinguishable</text>
  <text x="515" y="112" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">engagement &#183; significantly lower for AI</text>

