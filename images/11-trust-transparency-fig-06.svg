<svg xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.press/ns/figure" viewBox="0 0 700 480" role="img" aria-labelledby="ch11-fig06-title ch11-fig06-desc" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif">
  <title id="ch11-fig06-title">The Floor Numbers</title>
  <desc id="ch11-fig06-desc">Zero-anchored horizontal bar chart of five verified WGU Labs toplines: 89 percent can tell bot from person; 76 percent prefer a person for sensitive issues; 65 percent trust staff to use AI ethically; 65 percent know how to escalate to a human, with the remaining 35 percent hatched as the third who cannot find the human; 50 percent trust fellow students.</desc>
  <metadata>
    <cajal:figure chapter="11" figure="6" slug="wgu-floor-numbers" type="zero-anchored-bar-chart" rank="medium" class="PQ" concept="Verified WGU Labs toplines setting the transparency layer's floor; emphasized escalation gap" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07"/>
  </metadata>
