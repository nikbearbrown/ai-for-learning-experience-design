  <!-- caption -->
  <text x="64" y="408" font-size="11" fill="#545454">WGU Labs survey, n=545 online students, fielded September 2025 — a single institution whose population skews</text>
  <text x="64" y="424" font-size="11" fill="#545454">older and non-traditional. The 65/50 pair is the integrity-anxiety gap. The "40%+ of non-users cannot find the</text>
  <text x="64" y="440" font-size="11" fill="#545454">human" segment figure is unverified and excluded; only verified toplines are charted.</text>
  <text x="64" y="462" font-size="10" fill="#787878" letter-spacing="0.5">WGU LABS (2025), N=545 ONLINE STUDENTS</text>
