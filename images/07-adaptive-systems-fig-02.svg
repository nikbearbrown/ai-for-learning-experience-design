  <title id="ch7-fig2-title">The posterior walk to 0.95</title>
  <desc id="ch7-fig2-desc">A step trace of Bayesian Knowledge Tracing mastery estimates over four evidence events: prior 0.20 rises to 0.55 after a correct answer, to 0.84 after a second correct, drops to 0.51 after an incorrect, and recovers to 0.82 after a fourth correct — still below the solid mastery gate at 0.95, leaving the learner in the over-practice zone.</desc>
