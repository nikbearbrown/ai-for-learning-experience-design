  <!-- caption -->
  <text x="64" y="392" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Worked-example values from stipulated parameters — P(L&#8320;)=0.20, P(T)=0.15, P(G)=0.25, P(S)=0.10 — not empirical data.</text>
  <text x="64" y="406" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Four answers move the posterior 0.20 &#8594; 0.82; the 0.95 gate stays unreached, so the drill continues.</text>
