  <line x1="506" y1="230" x2="516" y2="230" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ch8f2-arrow)"/>

  <!-- output fork to two harm glyphs -->
  <line x1="620" y1="230" x2="640" y2="230" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="640" y1="230" x2="646" y2="216" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="640" y1="230" x2="646" y2="244" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="646" y="200" width="14" height="14" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <polygon points="646,262 660,262 653,248" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>

  <!-- harm key (inside the feedback loop's empty interior) -->
  <rect x="252" y="312" width="12" height="12" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="274" y="322" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">allocative harms — resources and routes withheld</text>
  <polygon points="252,352 264,352 258,341" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="274" y="350" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">representational harms — who the system says you are</text>

  <!-- deployment feedback return -->
  <path d="M570,252 L570,410 L114,410 L114,256" fill="none" stroke="#787878" stroke-width="1.2" marker-end="url(#ch8f2-arrow-gray)"/>
  <text x="342" y="402" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">deployment feedback returns to the start of the pipeline</text>

  <!-- caption -->
  <text x="64" y="444" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Five independent doors into one pipeline (Baker &amp; Hawn 2022). The five entry arrows are drawn with equal weight;</text>
  <text x="64" y="458" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">the entry points differ in mechanism and evidence base. Everything flows — which is precisely the problem.</text>
</svg>
