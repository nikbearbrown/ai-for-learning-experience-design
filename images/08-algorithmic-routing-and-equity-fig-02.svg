<!-- AI for Learning Experience Design | Ch.8 Algorithmic Routing and Equity | Figure 2 | Five doors into the pipeline | Nik Bear Brown | 2026-06-07 -->
<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch8-fig2-title ch8-fig2-desc">
  <title id="ch8-fig2-title">Five doors into the pipeline</title>
  <desc id="ch8-fig2-desc">A five-stage processing pipeline — training data, proxy features, labels and measures, representation, deployment — with one bias entry arrow descending into every stage, a deployment-feedback return sweeping beneath the pipeline back to training data, and an output fork into two harm classes: allocative (square) and representational (triangle). No protected attribute is required at any door.</desc>
  <metadata>
    <cajal:figure chapter="08" number="2" file="08-algorithmic-routing-and-equity-fig-02.svg" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07" type="linear-pipeline-with-entry-arrows" rank="High" concept="Baker &amp; Hawn 2022 structural map: bias enters at every pipeline stage, feeding allocative and representational harms" source-status="taxonomy; entry points rendered with equal weight (editorial flattening — mechanisms and evidence bases differ)"/>
  </metadata>
  <defs>
    <marker id="ch8f2-arrow" viewBox="0 0 10 8" markerWidth="9" markerHeight="7.2" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#2a1a0e"/>
    </marker>
    <marker id="ch8f2-arrow-gray" viewBox="0 0 10 8" markerWidth="9" markerHeight="7.2" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#787878"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
