  <!-- entry band -->
  <text x="350" y="104" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">bias enters at every stage — no protected attribute required</text>
  <circle cx="114" cy="128" r="5" fill="#787878"/>
  <circle cx="228" cy="128" r="5" fill="#787878"/>
  <circle cx="342" cy="128" r="5" fill="#787878"/>
  <circle cx="456" cy="128" r="5" fill="#787878"/>
  <circle cx="570" cy="128" r="5" fill="#787878"/>
  <line x1="114" y1="136" x2="114" y2="200" stroke="#787878" stroke-width="1.2" marker-end="url(#ch8f2-arrow-gray)"/>
  <line x1="228" y1="136" x2="228" y2="200" stroke="#787878" stroke-width="1.2" marker-end="url(#ch8f2-arrow-gray)"/>
  <line x1="342" y1="136" x2="342" y2="200" stroke="#787878" stroke-width="1.2" marker-end="url(#ch8f2-arrow-gray)"/>
  <line x1="456" y1="136" x2="456" y2="200" stroke="#787878" stroke-width="1.2" marker-end="url(#ch8f2-arrow-gray)"/>
  <line x1="570" y1="136" x2="570" y2="200" stroke="#787878" stroke-width="1.2" marker-end="url(#ch8f2-arrow-gray)"/>

  <!-- pipeline stages -->
  <rect x="64" y="208" width="100" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="114" y="234" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">training data</text>
  <rect x="178" y="208" width="100" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="228" y="234" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">proxy features</text>
  <rect x="292" y="208" width="100" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="342" y="228" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">labels &amp;</text>
  <text x="342" y="242" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">measures</text>
  <rect x="406" y="208" width="100" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="456" y="234" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">representation</text>
  <rect x="520" y="208" width="100" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="570" y="234" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">deployment</text>

  <!-- pipeline flow arrows -->
  <line x1="164" y1="230" x2="174" y2="230" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ch8f2-arrow)"/>
