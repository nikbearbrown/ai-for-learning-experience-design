  <title id="ch10-fig02-title">Program-Level Allocation: Load-Bearing Walls and Drywall</title>
  <desc id="ch10-fig02-desc">Architectural allocation schematic: six assessments stand on a program baseline. Two tall red Lane-1 piers alone send support arrows up to the beam carrying the program-level capability claim; four hollow Lane-2 partitions sit beneath the beam without touching it. The oral defense pier carries a heavier outline.</desc>
