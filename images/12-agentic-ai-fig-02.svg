<!-- CAJAL figure · ai-for-learning-experience-design · ch12 fig-02 · The Missing Layer · Nik Bear Brown · 2026-06-07 -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.press/ns/figure" viewBox="0 0 700 420" role="img" aria-labelledby="ch12-fig02-title ch12-fig02-desc" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif">
  <title id="ch12-fig02-title">The Missing Layer</title>
  <desc id="ch12-fig02-desc">Four-position stack: a solid model layer, a solid policy layer, a dashed empty void where the design layer should be, and the learner-experience layer at the bottom. A single arrow descends from the policy layer, crosses the empty void without touching anything, and lands on learner experience — decisions falling through the absent layer.</desc>
  <metadata>
    <cajal:figure chapter="12" figure="2" slug="missing-design-layer-stack" type="layered-stack-with-void" rank="high" class="VG" concept="The design layer between policy and learner experience is absent; decisions fall through it" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07"/>
  </metadata>
  <defs>
    <marker id="ch12f02-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2a1a0e"/></marker>
  </defs>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="64" y="30" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Figure 12.2 · The missing layer</text>

  <!-- model layer -->
  <rect x="110" y="64" width="500" height="50" fill="#545454"/>
  <text x="360" y="85" font-size="12" fill="#FFFFFF" text-anchor="middle">MODEL LAYER</text>
  <text x="360" y="103" font-size="11" fill="#D4D4D4" text-anchor="middle">assume the inferences were sound</text>

  <!-- policy layer -->
  <rect x="110" y="130" width="500" height="50" fill="#787878"/>
  <text x="360" y="151" font-size="12" fill="#FFFFFF" text-anchor="middle">POLICY LAYER</text>
  <text x="360" y="169" font-size="11" fill="#D4D4D4" text-anchor="middle">assume FERPA was honored</text>

  <!-- the void: structural absence (dashed, empty) -->
  <rect x="110" y="196" width="500" height="50" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="380" y="217" font-size="12" fill="#2a1a0e" text-anchor="middle">DESIGN LAYER — MISSING</text>
  <text x="380" y="235" font-size="11" fill="#545454" text-anchor="middle">what may it do · what does it owe the learner · how is it reversed</text>

  <!-- learner experience -->
  <rect x="110" y="262" width="500" height="50" fill="#ADADAD"/>
  <text x="360" y="283" font-size="12" fill="#2a1a0e" text-anchor="middle">LEARNER EXPERIENCE</text>
  <text x="360" y="301" font-size="11" fill="#545454" text-anchor="middle">someone lives with the result</text>

  <!-- fall-through arrow: crosses the void, meets nothing -->
  <line x1="146" y1="180" x2="146" y2="258" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ch12f02-arrow)"/>
  <text x="158" y="208" font-size="11" fill="#545454">decisions fall</text>
  <text x="158" y="222" font-size="11" fill="#545454">through, unspecified</text>

  <!-- caption -->
  <text x="64" y="346" font-size="11" fill="#545454">The diagnosis of Maya's semester: the model inferred soundly and the policy layer complied, yet the layer that</text>
  <text x="64" y="362" font-size="11" fill="#545454">says what the agent may do, what it owes the learner, and how it is reversed was never specified — decisions</text>
  <text x="64" y="378" font-size="11" fill="#545454">fall through the void, uninterrupted, onto learner experience. This chapter builds the missing layer.</text>
  <text x="64" y="400" font-size="10" fill="#787878" letter-spacing="0.5">DIAGNOSTIC STACK, CH. 12 · HONORS AUTHOR DIAGRAM PLACEHOLDER</text>
</svg>
