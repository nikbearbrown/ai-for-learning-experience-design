  <title id="fig-title-02-the-crutch-effect-02">The Rational Shortcut: One Choice, Accumulated Policy — 02-the-crutch-effect</title>
  <desc>Decision mechanism. At each stuck moment: Option A, struggle — high effort now, delayed invisible benefit (stronger schema); Option B, ask — low effort, guaranteed progress, delayed invisible cost (weaker schema). A loop arrow repeats Option B about 100 times per semester; the accumulated cost wedge grows. Dashed strokes mark delayed, invisible consequences.</desc>
