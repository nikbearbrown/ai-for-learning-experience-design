  <rect x="64" y="148" width="216" height="76" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="172" y="172" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">Option A — struggle</text>
  <text x="172" y="192" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454" text-anchor="middle">high effort now</text>
