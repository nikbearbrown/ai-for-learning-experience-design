  <text x="32" y="452" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Each B-choice is individually rational; the catastrophe exists only in repetition — dashed strokes mark delayed, invisible consequences.</text>
