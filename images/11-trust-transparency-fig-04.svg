<!-- CAJAL figure · ai-for-learning-experience-design · ch11 fig-04 · Calibrated Trust: The Field Between Misuse and Disuse · Nik Bear Brown · 2026-06-07 -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.press/ns/figure" viewBox="0 0 700 480" role="img" aria-labelledby="ch11-fig04-title ch11-fig04-desc" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif">
  <title id="ch11-fig04-title">Calibrated Trust: The Field Between Misuse and Disuse</title>
  <desc id="ch11-fig04-desc">Conceptual region diagram, not a chart: a square field with a diagonal calibration band running lower-left to upper-right, edged in red. Above the band, overtrust becomes misuse — a circle leans on a dashed incomplete strut. Below the band, distrust becomes disuse — a sturdy strut stands unused beside a leaning circle. Inside the band, circles sit on struts proportioned to what is actually there. No axes, ticks, or quantities.</desc>
  <metadata>
    <cajal:figure chapter="11" figure="4" slug="calibrated-trust-field" type="conceptual-region-diagram" rank="medium-high" class="VG" concept="Lee and See calibration: trust matched to actual local capability, between misuse and disuse" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07"/>
  </metadata>
  <defs>
    <clipPath id="ch11f04-field"><rect x="150" y="64" width="440" height="280"/></clipPath>
  </defs>
  <rect width="700" height="480" fill="#FFFFFF"/>
  <text x="64" y="30" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Figure 11.4 · Calibrated trust: the field between misuse and disuse</text>

  <!-- field (a state space, not a chart: no ticks, no axis furniture) -->
  <rect x="150" y="64" width="440" height="280" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>

  <!-- calibration band: the single red category (the design goal) -->
  <g clip-path="url(#ch11f04-field)">
    <polygon points="129.6,311.9 569.6,31.9 610.4,96.1 170.4,376.1" fill="#FFFFFF"/>
    <line x1="129.6" y1="311.9" x2="569.6" y2="31.9" stroke="#C8102E" stroke-width="1.5"/>
    <line x1="170.4" y1="376.1" x2="610.4" y2="96.1" stroke="#C8102E" stroke-width="1.5"/>
  </g>
  <text x="370" y="208" font-size="12" fill="#2a1a0e" text-anchor="middle" transform="rotate(-32.5 370 208)">CALIBRATED — reliance tracks capability</text>

  <!-- overtrust region (above band) -->
  <text x="170" y="96" font-size="11" fill="#545454">OVERTRUST → MISUSE</text>
  <text x="170" y="112" font-size="11" fill="#787878">relying where the system fails</text>
  <line x1="232" y1="200" x2="232" y2="176" stroke="#787878" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="238" cy="164" r="10" fill="#787878"/>

  <!-- distrust region (below band) -->
  <text x="570" y="300" font-size="11" fill="#545454" text-anchor="end">DISTRUST → DISUSE</text>
  <text x="570" y="316" font-size="11" fill="#787878" text-anchor="end">refusing help that works</text>
  <line x1="482" y1="272" x2="482" y2="240" stroke="#545454" stroke-width="2"/>
  <circle cx="460" cy="252" r="10" fill="#ADADAD"/>

  <!-- calibrated pairs inside the band -->
  <line x1="300" y1="262" x2="300" y2="242" stroke="#C8102E" stroke-width="2"/>
  <circle cx="300" cy="232" r="10" fill="#C8102E"/>
  <line x1="440" y1="176" x2="440" y2="148" stroke="#C8102E" stroke-width="2"/>
  <circle cx="440" cy="138" r="10" fill="#C8102E"/>

  <!-- margin labels (outside the frame; no axis machinery) -->
  <text x="370" y="366" font-size="11" fill="#545454" text-anchor="middle">SYSTEM CAPABILITY ON THE LOCAL TASK →</text>
  <text x="134" y="204" font-size="11" fill="#545454" text-anchor="middle" transform="rotate(-90 134 204)">LEARNER TRUST →</text>

  <!-- caption -->
  <text x="64" y="402" font-size="11" fill="#545454">Lee &amp; See (2004): calibrated trust matches reliance to actual local capability. Above the band, overtrust</text>
  <text x="64" y="418" font-size="11" fill="#545454">becomes misuse; below it, distrust becomes disuse. A conceptual space, not a chart — nothing is plotted, and</text>
  <text x="64" y="434" font-size="11" fill="#545454">no trust scores exist. Resolution — trust that discriminates by zone — is the band tightening.</text>
  <text x="64" y="458" font-size="10" fill="#787878" letter-spacing="0.5">AFTER LEE &amp; SEE (2004) · BAND-AS-RIBBON RENDERING IS THIS BOOK'S ADAPTATION</text>
</svg>
