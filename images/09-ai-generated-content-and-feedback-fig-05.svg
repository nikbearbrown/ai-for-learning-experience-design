  <!-- caption -->
  <text x="64" y="438" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Top: the replacement architecture — one AI system intercepts all learner work. Bottom: the partnership configuration —</text>
  <text x="64" y="452" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">the AI takes the fast, criteria-explicit pass on everything; scarce human attention goes to the pieces needing</text>
  <text x="64" y="466" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">misconception and motivational work. The 4/2 split is a qualitative allocation, not a measured ratio.</text>
