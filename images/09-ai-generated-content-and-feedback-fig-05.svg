  <text x="88" y="106" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454">work in</text>
  <text x="600" y="106" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454">work out</text>

  <!-- flow lines (drawn first; processor covers the middle) -->
