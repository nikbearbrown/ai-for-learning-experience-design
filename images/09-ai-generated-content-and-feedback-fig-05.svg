<!-- AI for Learning Experience Design | Ch.9 AI-Generated Content and Feedback | Figure 5 | Partnership beats replacement | Nik Bear Brown | 2026-06-07 -->
<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch9-fig5-title ch9-fig5-desc">
  <title id="ch9-fig5-title">Partnership beats replacement</title>
  <desc id="ch9-fig5-desc">Two-panel allocation schematic. Top, replacement: six pieces of learner work all pass through one monolithic AI processor. Bottom, partnership: all six pass first through a smaller AI block taking the fast, criteria-explicit pass; four continue straight to delivery while two are diverted upward through a human node — scarce human attention reserved for misconception and motivational work — before rejoining. The 4/2 split is a qualitative allocation, not a measured ratio.</desc>
  <metadata>
    <cajal:figure chapter="09" number="5" file="09-ai-generated-content-and-feedback-fig-05.svg" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07" type="two-panel-allocation-schematic" rank="Medium" concept="AI-plus-teacher partnership configuration vs. the replacement architecture" source-status="conceptual; hybrid superiority direction-verified at review level, Hwang &amp; Lee 2025 [verify — pin citation]"/>
  </metadata>
