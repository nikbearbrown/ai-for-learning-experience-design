  <text x="376" y="334" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" font-style="italic" fill="#787878">exit keyed to the loop</text>
  <text x="480" y="334" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" font-style="italic" fill="#787878">rubber stamp</text>
  <text x="584" y="334" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" font-style="italic" fill="#787878">harvested participation</text>

  <!-- caption -->
  <text x="64" y="384" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Five counter-patterns and their hollow doubles — identical silhouette, no substance. A counter-pattern implemented</text>
  <text x="64" y="398" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">as theater is worse than none: it spends the reform's credibility without delivering its protection.</text>
