<!-- AI for Learning Experience Design | Ch.8 Algorithmic Routing and Equity | Figure 6 | Every pattern has a theater twin | Nik Bear Brown | 2026-06-07 -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch8-fig6-title ch8-fig6-desc">
  <title id="ch8-fig6-title">Every pattern has a theater twin</title>
  <desc id="ch8-fig6-desc">Five vertical glyph pairs: each counter-pattern (solid, top row) above its theater twin (dashed hollow, bottom row) with identical silhouette — floor constraints over a symbolic floor, visible routing over a data-dump dashboard, off-ramps over an exit keyed to the loop, human-in-the-loop over a rubber stamp, co-design over harvested participation.</desc>
  <metadata>
    <cajal:figure chapter="08" number="6" file="08-algorithmic-routing-and-equity-fig-06.svg" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07" type="five-pair-solid-hollow-schematic" rank="Medium" concept="Five counter-patterns, each with a named failure mode — the solid form and its hollow twin" source-status="conceptual; glyph vocabulary is invented shorthand for the named patterns"/>
  </metadata>
