  <circle cx="272" cy="268" r="6" fill="none" stroke="#787878" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- PAIR 3: off-ramps (arrow leaving a loop) / exit keyed to the loop -->
  <circle cx="368" cy="158" r="14" fill="none" stroke="#2a1a0e" stroke-width="2"/>
  <line x1="378" y1="148" x2="400" y2="132" stroke="#2a1a0e" stroke-width="2" marker-end="url(#ch8f6-arrow)"/>
