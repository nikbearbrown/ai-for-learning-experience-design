  <!-- connectors -->
  <line x1="168" y1="190" x2="168" y2="230" stroke="#ADADAD" stroke-width="1"/>
  <line x1="272" y1="190" x2="272" y2="230" stroke="#ADADAD" stroke-width="1"/>
