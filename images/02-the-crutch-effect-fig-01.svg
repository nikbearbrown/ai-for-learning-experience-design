  <title id="fig-title-02-the-crutch-effect-01">One Extra Button: 64% vs. 30% — 02-the-crutch-effect</title>
  <desc>Zero-anchored dot plot. System-regulated chess students improved 64% over twelve weeks; self-regulated students — identical condition plus one on-demand help button — improved 30%, less than half the gain. Working paper; values as reported in secondary coverage.</desc>
