<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01-two-layers-of-change-02">
  <title id="fig-title-01-two-layers-of-change-02">The Two Layers: AI in Design Practice and in the Learning Experience — 01-two-layers-of-change</title>
  <desc>Two parallel planes. Layer 1: AI in design practice, user is the designer (quiz-bank generation, summary drafting); risk is designer deskilling. Layer 2: AI in the learning experience, user is the learner (24/7 question answering, module recommendation); the only layer where a Bastani-style deficit can originate. AI-generated feedback crosses both.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="AI for Learning Experience Design" book-slug="ai-for-learning-experience-design" chapter="01-two-layers-of-change" figure-number="02" figure-title="The Two Layers: AI in Design Practice and in the Learning Experience" figure-slug="two-layers" figure-type="conceptual-map" priority="critical" author="Nik Bear Brown" date-generated="2026-06-07" source-file="pantry/01-two-layers-of-change-cajal.md"/>
  </metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="32" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">The Two Layers: AI in Design Practice and in the Learning Experience</text>

  <!-- Layer 1 plane -->
  <rect x="64" y="64" width="512" height="108" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="76" y="86" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">LAYER 1 — AI in design practice · user: the designer</text>
  <text x="76" y="102" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">risk: workflow compression → designer deskilling</text>
  <circle cx="104" cy="128" r="4" fill="#2a1a0e"/>
  <text x="116" y="132" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">quiz-bank generation</text>
  <circle cx="104" cy="152" r="4" fill="#2a1a0e"/>
  <text x="116" y="156" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">summary drafting</text>

  <!-- Layer 2 plane (equal width — parallel domains, not hierarchy) -->
  <rect x="64" y="232" width="512" height="108" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="76" y="254" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">LAYER 2 — AI in the learning experience · user: the learner</text>
  <text x="76" y="270" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">risk: learning damage — the only layer where a Bastani-style deficit can originate</text>
  <circle cx="104" cy="296" r="4" fill="#2a1a0e"/>
  <text x="116" y="300" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">24/7 question answering</text>
  <circle cx="104" cy="320" r="4" fill="#2a1a0e"/>
  <text x="116" y="324" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">module recommendation</text>

  <!-- Crossing zone -->
  <rect x="420" y="64" width="120" height="276" fill="none" stroke="#787878" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="480" y="58" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" text-anchor="middle">crosses both layers</text>
  <circle cx="480" cy="202" r="6" fill="#C8102E"/>
  <text x="480" y="190" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">AI-generated feedback</text>
  <text x="480" y="220" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" text-anchor="middle">authored in Layer 1 · delivered in Layer 2</text>

  <!-- Outputs flow down -->
  <line x1="88" y1="176" x2="88" y2="226" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="100" y="205" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454">the learner inherits Layer 1 outputs</text>

  <!-- Hazard marker, Layer 2 only (structural: hollow diamond) -->
  <path d="M520 288 L530 298 L520 308 L510 298 Z" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="520" y="324" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" text-anchor="middle">deficit risk lives here</text>

  <!-- Caption -->
  <text x="32" y="372" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Features sit in the layer whose user's cognitive work they touch; feedback crosses — authored in Layer 1, delivered in Layer 2.</text>
  <text x="32" y="388" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">The two-layer taxonomy is this book's own construct, synthesized from the practice literature; untested as a predictor.</text>
