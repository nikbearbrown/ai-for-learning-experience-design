<!-- AI for Learning Experience Design | Ch.9 AI-Generated Content and Feedback | Figure 2 | The bottleneck moved | Nik Bear Brown | 2026-06-07 -->
<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch9-fig2-title ch9-fig2-desc">
  <title id="ch9-fig2-title">The bottleneck moved</title>
  <desc id="ch9-fig2-desc">Before-and-after pipeline comparison. Before: a short input queue waits at a very wide production stage with a judgment block nested inside it, then a thin final check, then output. After: production shrinks to a sliver, a long queue re-forms in front of a standalone, enlarged judgment-and-validation stage — the same judgment block, relocated and grown. Speed moved forward in the pipeline; the bottleneck moved to judgment.</desc>
  <metadata>
    <cajal:figure chapter="09" number="2" file="09-ai-generated-content-and-feedback-fig-02.svg" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07" type="before-after-stacked-pipeline" rank="High" concept="Near-zero-cost generation breaks the production-judgment coupling; the queue re-forms at validation" source-status="conceptual; queue lengths are qualitative magnitudes, not data"/>
  </metadata>
