  <!-- caption -->
  <text x="64" y="444" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">The same judgment block, relocated and grown: when generation was expensive, judgment rode inside production;</text>
  <text x="64" y="458" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">near-zero-cost generation re-forms the queue in front of validation. Queue lengths are qualitative, not measured.</text>
