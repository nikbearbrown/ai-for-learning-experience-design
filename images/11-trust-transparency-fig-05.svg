<svg xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.press/ns/figure" viewBox="0 0 700 480" role="img" aria-labelledby="ch11-fig05-title ch11-fig05-desc" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif">
  <title id="ch11-fig05-title">The Assembly: Six Files, Nine Cells, and the Holes</title>
  <desc id="ch11-fig05-desc">Convergence schematic: six spec-file cards feed thin provenance lines into one nine-cell per-touchpoint guardrail row. Seven cells are filled; one cell is conspicuously empty (a gap — a decision to ship the default), one cell is split diagonally with an inhibition mark (two source files contradict), and one dashed cell floats detached at right (an orphan touchpoint no file covered).</desc>
