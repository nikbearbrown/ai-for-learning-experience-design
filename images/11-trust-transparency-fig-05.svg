  <text x="64" y="368" font-size="11" fill="#545454">6 routing · 7 content/feedback · 8 assessment role · 9 escalation</text>

  <!-- caption -->
  <text x="64" y="402" font-size="11" fill="#545454">Six spec files converge into one per-touchpoint guardrail row; assembly is the integration test that makes the</text>
  <text x="64" y="418" font-size="11" fill="#545454">holes visible. An empty cell is not a missing decision — it is a decision to ship the default. One row stands for all.</text>
  <text x="64" y="442" font-size="10" fill="#787878" letter-spacing="0.5">GUARDRAIL ASSEMBLY, SPEC/05–SPEC/10, CH. 11 · ORPHAN CASE: THE NUDGE EMAIL</text>
