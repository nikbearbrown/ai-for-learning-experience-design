<!-- AI for Learning Experience Design · Chapter 5 · Figure 3 — The Two Futures · 2026-06-07 -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ch5-fig03-title ch5-fig03-desc">
  <title id="ch5-fig03-title">The Two Futures: What the A/B Test Measured and What It Couldn't</title>
  <desc id="ch5-fig03-desc">A timeline over career time with a dashed vertical study-horizon divider. In the upper register, a single measured artifact-quality line rises gently and never branches. In the lower register, a designer-capability line reaches the divider and splits into two dashed projections of equal weight: judgment accelerated, rising, and judgment atrophied, sagging. The region beyond the divider in the lower register is tinted as unmeasured.</desc>
  <metadata xmlns:cajal="https://cajal.org/ns/figure"><cajal:figure book="AI for Learning Experience Design" book-slug="ai-for-learning-experience-design" chapter="5" figure-number="3" title="The Two Futures: What the A/B Test Measured and What It Couldn't" slug="two-futures-timeline" type="branching-futures-timeline" priority="important" author="Nik Bear Brown" date="2026-06-07" source-file="pantry/05-ai-as-design-partner-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>
  <style>
    .t{font:14px 'EB Garamond','Garamond',Georgia,serif;fill:#2a1a0e}
    .l{font:12px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#2a1a0e}
    .s{font:11px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#545454}
    .src{font:10px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#787878;letter-spacing:.08em}
  </style>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text class="t" x="32" y="32">The Two Futures: What the A/B Test Measured and What It Couldn&#8217;t</text>

  <!-- unmeasured zone (lower register, beyond the study horizon) -->
  <rect x="250" y="196" width="410" height="128" fill="#F5F5F5"/>
  <text class="s" x="600" y="214" text-anchor="end" fill="#ADADAD">unmeasured</text>

  <!-- study horizon divider -->
  <line x1="250" y1="66" x2="250" y2="340" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="s" x="250" y="58" text-anchor="middle">study horizon</text>

  <!-- the artifact: measured, does not branch -->
  <path d="M90 160 C300 144, 480 124, 640 112" fill="none" stroke="#C8102E" stroke-width="2"/>
  <text class="l" x="96" y="134">artifact quality &#8212; measured; does not branch</text>

  <!-- the designer: capability, branching projections -->
  <path d="M90 272 C150 268, 210 264, 245 262" fill="none" stroke="#2a1a0e" stroke-width="1.5"/>
  <text class="l" x="96" y="296">designer capability</text>
  <circle cx="250" cy="262" r="5" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <path d="M255 259 C380 238, 520 224, 636 216" fill="none" stroke="#787878" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M255 265 C380 286, 520 300, 636 310" fill="none" stroke="#787878" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text class="s" x="636" y="234" text-anchor="end">judgment accelerated &#8212; projection</text>
  <text class="s" x="636" y="300" text-anchor="end">judgment atrophied &#8212; projection</text>

  <!-- timeline -->
  <line x1="80" y1="340" x2="644" y2="340" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="180" y1="336" x2="180" y2="344" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="400" y1="336" x2="400" y2="344" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="540" y1="336" x2="540" y2="344" stroke="#2a1a0e" stroke-width="1"/>
  <text class="s" x="644" y="358" text-anchor="end">career time</text>

  <text class="src" x="32" y="380">MOORE ET AL. 2025</text>
  <text class="s" x="32" y="396">Conceptual schematic. Every measured data point tracks the artifact, which is identical under both futures; designer capability</text>
  <text class="s" x="32" y="411">beyond the study horizon is unmeasured &#8212; no longitudinal study exists, and both branches are projections of equal weight.</text>
</svg>
