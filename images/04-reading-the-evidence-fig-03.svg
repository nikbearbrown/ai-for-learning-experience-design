<!-- AI for Learning Experience Design · Chapter 4 · Figure 3 — The Claim Autopsy · 2026-06-07 -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ch4-fig03-title ch4-fig03-desc">
  <title id="ch4-fig03-title">The Claim Autopsy: Three Piles, Three Verification Routes</title>
  <desc id="ch4-fig03-desc">A flowchart in which a vendor document is sorted through a diamond node into three parallel lanes: interaction-design claims route to hands-on product testing, outcome claims route to a demand for tiered causal evidence shown as a four-step ESSA pyramid, and borrowed evidence routes to a citation trace back to a different source document.</desc>
  <metadata xmlns:cajal="https://cajal.org/ns/figure"><cajal:figure book="AI for Learning Experience Design" book-slug="ai-for-learning-experience-design" chapter="4" figure-number="3" title="The Claim Autopsy: Three Piles, Three Verification Routes" slug="claim-autopsy-three-piles" type="classification-flowchart" priority="important" author="Nik Bear Brown" date="2026-06-07" source-file="pantry/04-reading-the-evidence-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>
  <style>
    .t{font:14px 'EB Garamond','Garamond',Georgia,serif;fill:#2a1a0e}
    .l{font:12px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#2a1a0e}
    .s{font:11px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#545454}
    .m{font:11px 'JetBrains Mono','Fira Code','Courier New',monospace;fill:#2a1a0e}
  </style>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text class="t" x="32" y="32">The Claim Autopsy: Three Piles, Three Verification Routes</text>

  <!-- vendor document -->
  <path d="M48 160 L104 160 L120 176 L120 240 L48 240 Z" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <path d="M104 160 L104 176 L120 176" fill="none" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="58" y1="192" x2="110" y2="192" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="58" y1="206" x2="110" y2="206" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="58" y1="220" x2="110" y2="220" stroke="#D4D4D4" stroke-width="1"/>
  <text class="s" x="84" y="256" text-anchor="middle">vendor page</text>

  <!-- sorter -->
  <line x1="120" y1="200" x2="146" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polygon points="185 168, 222 200, 185 232, 148 200" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text class="s" x="185" y="204" text-anchor="middle">sort each</text>
  <text class="s" x="185" y="217" text-anchor="middle">sentence</text>

  <!-- fan arrows -->
  <line x1="222" y1="200" x2="256" y2="112" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="222" y1="200" x2="256" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="222" y1="200" x2="256" y2="288" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- lane 1: interaction-design claim -->
  <rect x="260" y="88" width="160" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text class="l" x="340" y="114" text-anchor="middle">interaction-design claim</text>
  <line x1="420" y1="110" x2="448" y2="110" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="474" cy="104" r="11" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="482" y1="112" x2="494" y2="124" stroke="#2a1a0e" stroke-width="1.5"/>
  <circle cx="500" cy="127" r="5" fill="none" stroke="#787878" stroke-width="1"/>
  <line x1="500" y1="119" x2="500" y2="122" stroke="#787878" stroke-width="1"/>
  <line x1="500" y1="132" x2="500" y2="135" stroke="#787878" stroke-width="1"/>
  <line x1="492" y1="127" x2="495" y2="127" stroke="#787878" stroke-width="1"/>
  <line x1="505" y1="127" x2="508" y2="127" stroke="#787878" stroke-width="1"/>
  <text class="l" x="520" y="106">use the product</text>
  <text class="s" x="520" y="121">direct hands-on testing, today</text>

  <!-- lane 2: outcome claim -->
  <rect x="260" y="178" width="160" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text class="l" x="340" y="204" text-anchor="middle">outcome claim</text>
  <line x1="420" y1="200" x2="448" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="458" y="212" width="64" height="9" fill="#EBEBEB" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="466" y="202" width="48" height="9" fill="#EBEBEB" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="474" y="192" width="32" height="9" fill="#787878"/>
  <rect x="482" y="182" width="16" height="9" fill="#787878"/>
  <text class="l" x="536" y="196">demand causal evidence</text>
  <text class="s" x="536" y="211">tier it (ESSA); most products sit</text>
  <text class="s" x="536" y="224">at the pale Tiers 3&#8211;4</text>

  <!-- lane 3: borrowed evidence -->
  <rect x="260" y="268" width="160" height="44" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text class="l" x="340" y="294" text-anchor="middle">borrowed evidence</text>
  <line x1="420" y1="290" x2="448" y2="290" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M456 284 C496 262, 548 262, 566 282" fill="none" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M552 286 L580 286 L590 296 L590 326 L552 326 Z" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <path d="M580 286 L580 296 L590 296" fill="none" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="560" y1="306" x2="582" y2="306" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="560" y1="316" x2="582" y2="316" stroke="#D4D4D4" stroke-width="1"/>
  <text class="s" x="456" y="318">trace the citation to its</text>
  <text class="s" x="456" y="331">true product class</text>

  <text class="s" x="32" y="380">Every sentence on a vendor page sorts into exactly one of three piles, and each pile licenses a different, differently priced</text>
  <text class="s" x="32" y="395">verification route. Borrowed evidence is rerouted to the product class it actually describes &#8212; informative, never discarded.</text>
</svg>
