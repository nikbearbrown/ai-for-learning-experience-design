<!-- AI for Learning Experience Design · Chapter 6 · Figure 1 — Same Model, Two Architectures · 2026-06-07 -->
<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ch6-fig01-title ch6-fig01-desc">
  <title id="ch6-fig01-title">Same Model, Two Architectures</title>
  <desc id="ch6-fig01-desc">Two tutoring architectures share one model base. On the left, GPT Base: a generic instruction lets the answer flow straight out as an unimpeded delivery. On the right, GPT Tutor: a three-layer prompt stack — the answer held under do-not-reveal, a per-problem misconception inventory, and an attempt-first incremental-hint instruction — releases hints through a gate while the answer itself never leaves the stack.</desc>
  <metadata xmlns:cajal="https://cajal.org/ns/figure"><cajal:figure book="AI for Learning Experience Design" book-slug="ai-for-learning-experience-design" chapter="6" figure-number="1" title="Same Model, Two Architectures" slug="same-model-two-architectures" type="architecture-comparison" priority="critical" author="Nik Bear Brown" date="2026-06-07" source-file="pantry/06-designing-tutoring-interactions-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>
  <style>
    .t{font:14px 'EB Garamond','Garamond',Georgia,serif;fill:#2a1a0e}
    .l{font:12px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#2a1a0e}
    .s{font:11px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#545454}
    .src{font:10px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#787878;letter-spacing:.08em}
  </style>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <text class="t" x="32" y="32">Same Model, Two Architectures</text>

  <text class="l" x="200" y="58" text-anchor="middle">GPT Base</text>
  <text class="l" x="510" y="58" text-anchor="middle">GPT Tutor</text>
  <line x1="350" y1="66" x2="350" y2="304" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- left: generic instruction, unimpeded delivery -->
  <rect x="140" y="252" width="120" height="36" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text class="s" x="200" y="274" text-anchor="middle">generic instruction</text>
  <line x1="200" y1="312" x2="200" y2="288" stroke="#787878" stroke-width="1"/>
  <line x1="200" y1="252" x2="200" y2="128" stroke="#2a1a0e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <circle cx="200" cy="112" r="10" fill="#2a1a0e"/>
  <text class="l" x="200" y="88" text-anchor="middle">direct answer &#8212; delivered</text>

  <!-- right: three-layer prompt stack -->
  <rect x="400" y="254" width="220" height="30" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <circle cx="414" cy="274" r="4" fill="none" stroke="#2a1a0e" stroke-width="1.25"/>
  <line x1="418" y1="274" x2="428" y2="274" stroke="#2a1a0e" stroke-width="1.25"/>
  <line x1="425" y1="274" x2="425" y2="278" stroke="#2a1a0e" stroke-width="1.25"/>
  <line x1="428" y1="274" x2="428" y2="279" stroke="#2a1a0e" stroke-width="1.25"/>
  <line x1="408" y1="266" x2="426" y2="266" stroke="#2a1a0e" stroke-width="2.5"/>
  <text class="s" x="436" y="273">answer + solution &#183; do not reveal</text>

  <rect x="400" y="220" width="220" height="30" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <path d="M406 240 l4 -7 l4 7" fill="none" stroke="#787878" stroke-width="1.25"/>
  <path d="M416 240 l4 -7 l4 7" fill="none" stroke="#787878" stroke-width="1.25"/>
  <path d="M426 240 l4 -7 l4 7" fill="none" stroke="#787878" stroke-width="1.25"/>
  <text class="s" x="436" y="239">per-problem misconception inventory</text>

  <rect x="400" y="186" width="220" height="30" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <path d="M406 208 h6 v-5 h6 v-5 h6" fill="none" stroke="#787878" stroke-width="1.25"/>
  <text class="s" x="436" y="205">attempt-first, incremental hints</text>

  <line x1="510" y1="312" x2="510" y2="284" stroke="#787878" stroke-width="1"/>

  <!-- gated release -->
  <line x1="510" y1="186" x2="510" y2="166" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="498" y="142" width="24" height="24" fill="none" stroke="#2a1a0e" stroke-width="1.5"/>
  <text class="s" x="532" y="158">release gate</text>
  <line x1="510" y1="142" x2="510" y2="124" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="482" cy="114" r="4" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.75"/>
  <circle cx="506" cy="104" r="6" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.75"/>
  <circle cx="534" cy="92" r="8" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.75"/>
  <text class="l" x="520" y="74" text-anchor="middle">gated hints &#8212; answer withheld</text>

  <!-- shared foundation -->
  <rect x="72" y="312" width="556" height="40" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text class="l" x="350" y="337" text-anchor="middle">same model, same knowledge</text>

  <text class="src" x="32" y="388">BASTANI ET AL. 2025</text>
  <text class="s" x="32" y="406">Same model in both conditions; only the prompt architecture differs (57 bespoke per-problem prompts). GPT Tutor&#8217;s prompt</text>
  <text class="s" x="32" y="421">contains the correct answer precisely so it can be structurally withheld: presence enables withholding. Hints release through</text>
  <text class="s" x="32" y="436">a gate; the answer never leaves the stack. The unimpeded left arrow is the failure mode, not the success.</text>
</svg>
