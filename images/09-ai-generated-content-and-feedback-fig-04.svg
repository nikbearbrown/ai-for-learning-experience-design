  <circle cx="576" cy="238" r="34" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="2"/>
  <circle cx="576" cy="238" r="13" fill="#C8102E"/>

  <line x1="452" y1="200" x2="488" y2="162" stroke="#787878" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ch9f4-arrow-gray)"/>
