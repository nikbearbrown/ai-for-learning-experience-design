  <text x="576" y="296" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">named misconception</text>

  <!-- core key -->
  <circle cx="216" cy="330" r="6" fill="#C8102E"/>
  <text x="228" y="334" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">the construct — the core</text>
  <line x1="420" y1="330" x2="448" y2="330" stroke="#787878" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="456" y="334" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">asserted, not real</text>

  <!-- caption -->
  <text x="64" y="384" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">The same failure in both directions: an automated scorer reads only the measurable shell — structure, sophistication,</text>
  <text x="64" y="398" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">length — so full and hollow earn the identical verdict; a distractor without a misconception core diagnoses nothing.</text>
</svg>
