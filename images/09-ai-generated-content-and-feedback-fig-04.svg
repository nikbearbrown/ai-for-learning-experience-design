  <text x="207" y="92" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">evaluation side &#183; the BABEL result</text>

  <text x="150" y="122" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">with construct</text>
  <text x="264" y="122" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">hollow shell</text>

  <circle cx="150" cy="170" r="34" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="2"/>
  <circle cx="150" cy="170" r="13" fill="#C8102E"/>
  <circle cx="264" cy="170" r="34" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="2"/>

  <line x1="150" y1="208" x2="150" y2="244" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ch9f4-arrow)"/>
  <line x1="264" y1="208" x2="264" y2="244" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ch9f4-arrow)"/>

  <circle cx="150" cy="260" r="8" fill="#2a1a0e"/>
  <circle cx="264" cy="260" r="8" fill="#2a1a0e"/>
  <text x="207" y="294" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">identical top score</text>

  <!-- RIGHT: generation side, reads upward -->
  <text x="510" y="92" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">generation side &#183; plausible distractors</text>

  <text x="510" y="112" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">test item</text>
