<!-- AI for Learning Experience Design | Ch.9 AI-Generated Content and Feedback | Figure 4 | The shell without the core | Nik Bear Brown | 2026-06-07 -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch9-fig4-title ch9-fig4-desc">
  <title id="ch9-fig4-title">The shell without the core</title>
  <desc id="ch9-fig4-desc">Mirrored two-panel core-and-shell schematic. Left, evaluation side (the BABEL result): a shell containing a solid construct core and an identical empty shell both receive the identical verdict mark from the automated scorer. Right, generation side: a hollow distractor connects to the test item only by a dashed, asserted link, while a distractor with a named-misconception core connects by a solid link — the same proxy-versus-construct failure, mirrored.</desc>
  <metadata>
    <cajal:figure chapter="09" number="4" file="09-ai-generated-content-and-feedback-fig-04.svg" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07" type="mirrored-core-shell-schematic" rank="Medium" concept="Proxy vs. construct in both directions: BABEL on evaluation, plausible distractors on generation" source-status="conceptual; verdict equality renders the BABEL finding, no score values depicted"/>
  </metadata>
