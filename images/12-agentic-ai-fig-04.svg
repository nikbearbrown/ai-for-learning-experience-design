  <!-- caption -->
  <text x="64" y="320" font-size="11" fill="#545454">A practitioner attitude-and-intent survey, not education-specific: 86% of organizations plan to increase</text>
  <text x="64" y="336" font-size="11" fill="#545454">agentic-AI investment; 6% deeply trust it. The gap is not hypocrisy — it is the absence of the design layer this</text>
  <text x="64" y="352" font-size="11" fill="#545454">chapter teaches. Adjacent figures (~9% production, ~12% governance-ready) are unpinned and excluded.</text>
  <text x="64" y="378" font-size="10" fill="#787878" letter-spacing="0.5">HBR ANALYTIC SERVICES (2025)</text>
