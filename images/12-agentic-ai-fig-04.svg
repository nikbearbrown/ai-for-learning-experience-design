<svg xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.press/ns/figure" viewBox="0 0 700 420" role="img" aria-labelledby="ch12-fig04-title ch12-fig04-desc" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif">
  <title id="ch12-fig04-title">Invest at 86, Trust at 6</title>
  <desc id="ch12-fig04-desc">Zero-anchored horizontal bar chart with two bars on one shared scale: 86 percent of surveyed organizations plan to increase agentic-AI investment, while 6 percent say they deeply trust agentic AI. The white gap between the bars does the work; hairline frames mark 100 percent.</desc>
  <metadata>
    <cajal:figure chapter="12" figure="4" slug="invest-86-trust-6" type="zero-anchored-bar-chart" rank="medium-high" class="PQ" concept="HBR 2025 pair: 86 percent investment intent vs 6 percent deep trust; the gap is the missing design layer" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07"/>
  </metadata>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="64" y="30" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Figure 12.4 · Invest at 86, trust at 6</text>

