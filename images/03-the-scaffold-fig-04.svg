  <title id="fig-title-03-the-scaffold-04">The Seven-Pattern Catalog Along One Help Interaction — 03-the-scaffold</title>
  <desc>Five in-line patterns on one help interaction: reasoning gate, Socratic hint ladder, error-flagging without correction, metacognitive prompt, transfer sequencing — ending at unaided performance. Two overlays: a dashed fading band narrowing over time (extrapolation flag) and a constant-width human override bar that never fades.</desc>
