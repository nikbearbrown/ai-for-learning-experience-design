<svg xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.press/ns/figure" viewBox="0 0 700 420" role="img" aria-labelledby="ch10-fig01-title ch10-fig01-desc" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif">
  <title id="ch10-fig01-title">The Validity Chain and Where GenAI Cuts It</title>
  <desc id="ch10-fig01-desc">Kane's four-inference validity chain — scoring, generalization, extrapolation, decision — drawn left to right. Generative AI severs the link into extrapolation, marked by a wedge and an inhibition bar; extrapolation and decision are rendered hollow and dashed, present but no longer load-bearing.</desc>
  <metadata>
    <cajal:figure chapter="10" figure="1" slug="validity-chain-genai-cut" type="process-chain-with-break" rank="critical" class="MC" concept="Kane's four-inference chain severed at extrapolation; decision link orphaned at zero detected cheating" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07"/>
  </metadata>
  <defs>
    <marker id="ch10f01-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2a1a0e"/></marker>
    <marker id="ch10f01-arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#787878"/></marker>
  </defs>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text x="64" y="30" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Figure 10.1 · The validity chain and where GenAI cuts it</text>

  <!-- inference numerals (mono) -->
  <text x="123" y="156" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#787878" text-anchor="middle">1</text>
  <text x="282" y="156" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#787878" text-anchor="middle">2</text>
  <text x="441" y="156" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#787878" text-anchor="middle">3</text>
  <text x="599" y="156" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#787878" text-anchor="middle">4</text>

  <!-- GenAI wedge pressing onto the cut -->
  <text x="361" y="120" font-size="12" fill="#2a1a0e" text-anchor="middle">GENERATIVE AI</text>
  <polygon points="349,128 373,128 361,162" fill="#2a1a0e"/>

  <!-- nodes -->
  <rect x="64" y="170" width="118" height="56" fill="#2a1a0e"/>
  <text x="123" y="194" font-size="12" fill="#FFFFFF" text-anchor="middle">SCORING</text>
  <text x="123" y="212" font-size="11" fill="#D4D4D4" text-anchor="middle">performance → score</text>

  <rect x="223" y="170" width="118" height="56" fill="#2a1a0e"/>
  <text x="282" y="194" font-size="12" fill="#FFFFFF" text-anchor="middle">GENERALIZATION</text>
  <text x="282" y="212" font-size="11" fill="#D4D4D4" text-anchor="middle">score → test domain</text>

  <rect x="382" y="170" width="118" height="56" fill="#FFFFFF" stroke="#787878" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="441" y="194" font-size="12" fill="#545454" text-anchor="middle">EXTRAPOLATION</text>
  <text x="441" y="212" font-size="11" fill="#787878" text-anchor="middle">test → capability</text>

  <rect x="541" y="170" width="118" height="56" fill="#FFFFFF" stroke="#ADADAD" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="600" y="194" font-size="12" fill="#787878" text-anchor="middle">DECISION</text>
  <text x="600" y="212" font-size="11" fill="#ADADAD" text-anchor="middle">capability → action</text>

  <!-- link 1: intact -->
  <line x1="184" y1="198" x2="219" y2="198" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ch10f01-arrow)"/>
  <!-- link 2: severed (inhibition bar) -->
  <line x1="343" y1="198" x2="355" y2="198" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="361" y1="176" x2="361" y2="220" stroke="#2a1a0e" stroke-width="2.5"/>
  <line x1="367" y1="198" x2="378" y2="198" stroke="#787878" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ch10f01-arrow-gray)"/>
  <!-- link 3: orphaned -->
  <line x1="502" y1="198" x2="537" y2="198" stroke="#787878" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ch10f01-arrow-gray)"/>

  <!-- zone rules and tags -->
  <line x1="64" y1="252" x2="341" y2="252" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="382" y1="252" x2="659" y2="252" stroke="#D4D4D4" stroke-width="1"/>
  <text x="202" y="270" font-size="11" fill="#545454" text-anchor="middle">holds — these inferences survive</text>
  <text x="520" y="270" font-size="11" fill="#545454" text-anchor="middle">hangs — nothing upstream supports them</text>

  <!-- caption -->
  <text x="64" y="334" font-size="11" fill="#545454">Kane's chain: each inference licenses the next. Generative AI severs the link into extrapolation — test</text>
  <text x="64" y="350" font-size="11" fill="#545454">performance no longer evidences real-world capability — so the decision link hangs unsupported. Scoring and</text>
  <text x="64" y="366" font-size="11" fill="#545454">generalization hold. The hollowed downstream links are the chapter's claim, not Kane's own diagram.</text>
  <text x="64" y="392" font-size="10" fill="#787878" letter-spacing="0.5">AFTER KANE (2013) · BREAK ARGUED IN CHAPTER 10 AT ZERO DETECTED CHEATING</text>
</svg>
