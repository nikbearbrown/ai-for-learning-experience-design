  <text x="32" y="352" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">The same deployment raised assisted performance and lowered unassisted learning at once; neither endpoint is a proxy for the other.</text>
  <text x="32" y="368" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Scope: one school, one country, one subject, one term — decisive on design-dependence, not on effect-size generalization.</text>
