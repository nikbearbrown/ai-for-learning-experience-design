  <title id="fig-title-03-the-scaffold-01">Three Architectures: Where the Judgment Lives — 03-the-scaffold</title>
  <desc>Three parallel panels with the same cast (AI, human, learner) and one moving judgment marker. Constrain the AI: judgment encoded in advance, AI faces the learner. Supervise the AI: judgment at a runtime human checkpoint. Support the human: judgment stays with the tutor; the AI only suggests and never touches the learner.</desc>
