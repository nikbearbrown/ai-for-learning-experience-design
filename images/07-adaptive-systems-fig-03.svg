<!-- AI for Learning Experience Design | Ch.7 Adaptive Systems | Figure 3 | Two interiors, one reading | Nik Bear Brown | 2026-06-07 -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch7-fig3-title ch7-fig3-desc">
  <title id="ch7-fig3-title">Two interiors, one reading</title>
  <desc id="ch7-fig3-desc">Convergence schematic: two learners with entirely different internal patterns of gaps in understanding map by converging arrows onto the identical single point of a one-dimensional ability scale — item response theory as thermometer, not diagnosis.</desc>
