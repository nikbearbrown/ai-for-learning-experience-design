  <!-- caption -->
  <text x="64" y="384" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Item response theory compresses each learner to a single position on one difficulty-ordered dimension. Two entirely</text>
