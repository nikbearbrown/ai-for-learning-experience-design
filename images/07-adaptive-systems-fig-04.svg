<!-- AI for Learning Experience Design | Ch.7 Adaptive Systems | Figure 4 | Generator, not oracle | Nik Bear Brown | 2026-06-07 -->
<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch7-fig4-title ch7-fig4-desc">
  <title id="ch7-fig4-title">Generator, not oracle — two LLM architectures</title>
  <desc id="ch7-fig4-desc">Two stacked architecture panels. Panel A, endorsed: a classical learner model (BKT or IRT) holds learner state and feeds an LLM generator that renders content for the learner; evidence loops back to the auditable model. Panel B, blocked: the LLM occupies the learner-model seat with no persistent state behind it, and its authority channel toward the learner is stopped by a perpendicular block bar — unstable estimates, wrong-direction updates, no persistent representation.</desc>
  <metadata>
    <cajal:figure chapter="07" number="4" file="07-adaptive-systems-fig-04.svg" book="ai-for-learning-experience-design" author="Nik Bear Brown" date="2026-06-07" type="two-panel-architecture-comparison" rank="High" concept="LLM as generator on a classical learner model (endorsed) vs. LLM as learner model (blocked by 2025 evidence)" source-status="conceptual; evidence return loop is an inferred flow"/>
  </metadata>
  <defs>
    <marker id="ch7f4-arrow" viewBox="0 0 10 8" markerWidth="9" markerHeight="7.2" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#2a1a0e"/>
    </marker>
    <marker id="ch7f4-arrow-gray" viewBox="0 0 10 8" markerWidth="9" markerHeight="7.2" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#787878"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <text x="64" y="30" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Generator, not oracle — two LLM architectures</text>

  <!-- PANEL A -->
  <text x="64" y="66" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">A &#183; Endorsed — the classical model holds state; the LLM only renders</text>

  <rect x="88" y="108" width="150" height="56" fill="#C8102E"/>
  <text x="163" y="131" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#FFFFFF">learner model</text>
  <text x="163" y="149" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#FFFFFF">BKT / IRT</text>

  <line x1="238" y1="136" x2="292" y2="136" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ch7f4-arrow)"/>

  <rect x="296" y="108" width="140" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="366" y="131" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">LLM generator</text>
  <text x="366" y="149" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">renders content</text>

  <line x1="436" y1="136" x2="494" y2="136" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#ch7f4-arrow)"/>

  <circle cx="522" cy="136" r="24" fill="#FFFFFF" stroke="#787878" stroke-width="1"/>
  <text x="522" y="140" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">learner</text>

  <!-- evidence return loop -->
  <path d="M522,160 L522,196 L163,196 L163,168" fill="none" stroke="#787878" stroke-width="1.2" marker-end="url(#ch7f4-arrow-gray)"/>
  <text x="342" y="189" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">evidence returns to the auditable model</text>

  <!-- decision rule -->
  <text x="350" y="226" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" font-style="italic" fill="#545454">vary what the learner sees &#8800; decide what the learner knows</text>

  <!-- PANEL B -->
  <text x="64" y="252" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">B &#183; Blocked — the LLM in the learner-model seat</text>

  <rect x="88" y="286" width="150" height="56" fill="#FFFFFF" stroke="#787878" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="163" y="318" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#787878">no persistent state</text>

  <rect x="296" y="286" width="140" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="366" y="309" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">LLM as learner model</text>
  <text x="366" y="327" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">unstable estimates</text>

  <!-- blocked channel: line stopped by a perpendicular bar -->
  <line x1="436" y1="314" x2="470" y2="314" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="472" y1="300" x2="472" y2="328" stroke="#2a1a0e" stroke-width="2.5"/>

  <circle cx="522" cy="314" r="24" fill="#FFFFFF" stroke="#ADADAD" stroke-width="1"/>
  <text x="522" y="318" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#ADADAD">learner</text>

  <text x="380" y="368" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">wrong-direction updates &#183; no persistent representation</text>

  <!-- caption -->
  <text x="64" y="444" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">In A, an auditable classical model (BKT or IRT) stays in charge of what the learner needs while the LLM varies how it</text>
  <text x="64" y="458" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">is presented. In B, the LLM holds learner state itself — blocked by 2025 evidence: unstable, drifting, unauditable.</text>
</svg>
