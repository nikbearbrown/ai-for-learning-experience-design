  <!-- caption -->
  <text x="64" y="392" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Illustrative worked case (DataWise 101) — not empirical data. Two learners enter at the identical 62% diagnostic; by</text>
