<!-- AI for Learning Experience Design | Ch.8 Algorithmic Routing and Equity | Figure 4 | Same start, different diets | Nik Bear Brown | 2026-06-07 -->
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" xmlns:cajal="https://cajal.dev/ns" role="img" aria-labelledby="ch8-fig4-title ch8-fig4-desc">
  <title id="ch8-fig4-title">Same start, different diets</title>
  <desc id="ch8-fig4-desc">Zero-anchored divergence chart over six weeks: two learners begin at one shared origin (identical 62 percent diagnostic). Learner A's share of higher-order tasks climbs to 40 percent by week six; Learner B's declines to 8 percent, bending downward at three fork events — week two (session break scored as failures), week three (latency spike trips the classifier), week four (remediation exit keyed to its own estimate). Values are an illustrative worked case, not empirical data.</desc>
