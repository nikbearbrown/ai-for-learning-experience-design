  <!-- Caption -->
  <text x="32" y="452" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Panels are not on a common scale; units differ across studies (percent improvement vs. percentage points).</text>
  <text x="32" y="468" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Red: the one transfer result in the set. Parity dots sit on zero with whiskers; dashes mark endpoints not measured — absence, not null effect.</text>
  <text x="32" y="484" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">LearnLM × Eedi: exploratory RCT, industry-published. Tutor CoPilot: +9 pp is the lowest-rated-tutor subgroup; ns [verify].</text>
