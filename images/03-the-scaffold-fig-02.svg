  <title id="fig-title-03-the-scaffold-02">Three Positive Findings, Three Different Endpoints — 03-the-scaffold</title>
  <desc>Small-multiple dot plots, one per study, zero-anchored, not on a common scale. GPT Tutor: assisted +127%, unassisted parity, transfer not measured. LearnLM × Eedi: immediate parity, transfer +5.5 pp (the only transfer result, highlighted). Tutor CoPilot: unassisted +4 pp, +9 pp lowest-rated-tutor subgroup (ring marker).</desc>
