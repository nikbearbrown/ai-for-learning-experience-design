<!-- AI for Learning Experience Design · Chapter 4 · Figure 4 — The Three-Bucket Discipline · 2026-06-07 -->
<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ch4-fig04-title ch4-fig04-desc">
  <title id="ch4-fig04-title">The Three-Bucket Discipline and the Burden-of-Proof Flip</title>
  <desc id="ch4-fig04-desc">A vertical decision flowchart. A proposed design decision passes gate one (causal direction established, error cost low or symmetric) toward a decide terminal; failing that, gate two (suggestive evidence, unassisted-endpoint pilot feasible) toward a pilot terminal; failing both, a risk-asymmetry node with a tilted balance leads to a flat stop bar: decline. The stop bar marks a block, not a route.</desc>
  <metadata xmlns:cajal="https://cajal.org/ns/figure"><cajal:figure book="AI for Learning Experience Design" book-slug="ai-for-learning-experience-design" chapter="4" figure-number="4" title="The Three-Bucket Discipline and the Burden-of-Proof Flip" slug="three-bucket-discipline" type="decision-flowchart" priority="important" author="Nik Bear Brown" date="2026-06-07" source-file="pantry/04-reading-the-evidence-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>
  <style>
    .t{font:14px 'EB Garamond','Garamond',Georgia,serif;fill:#2a1a0e}
    .l{font:12px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#2a1a0e}
    .s{font:11px 'Inter',-apple-system,'Helvetica Neue',sans-serif;fill:#545454}
  </style>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <text class="t" x="32" y="32">The Three-Bucket Discipline and the Burden-of-Proof Flip</text>

  <!-- entry -->
  <rect x="220" y="56" width="160" height="32" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text class="l" x="300" y="76" text-anchor="middle">proposed design decision</text>
  <line x1="300" y1="88" x2="300" y2="100" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- gate 1 -->
  <polygon points="300 102, 400 132, 300 162, 200 132" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text class="s" x="300" y="128" text-anchor="middle">causal direction established?</text>
  <text class="s" x="300" y="142" text-anchor="middle">error cost low / symmetric?</text>
  <line x1="400" y1="132" x2="478" y2="132" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="s" x="436" y="124" text-anchor="middle">yes</text>
  <circle cx="514" cy="132" r="28" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <path d="M502 132 L511 142 L528 118" fill="none" stroke="#C8102E" stroke-width="2.5"/>
  <text class="l" x="514" y="176" text-anchor="middle">decide now</text>
  <line x1="300" y1="162" x2="300" y2="194" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="s" x="288" y="182" text-anchor="end">no</text>

  <!-- gate 2 -->
  <polygon points="300 196, 400 226, 300 256, 200 226" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text class="s" x="300" y="222" text-anchor="middle">suggestive evidence?</text>
  <text class="s" x="300" y="236" text-anchor="middle">unassisted-endpoint pilot feasible?</text>
  <line x1="400" y1="226" x2="478" y2="226" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="s" x="436" y="218" text-anchor="middle">yes</text>
  <circle cx="514" cy="226" r="28" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <path d="M508 210 L508 218 L498 238 L530 238 L520 218 L520 210 Z" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.25"/>
  <line x1="505" y1="210" x2="523" y2="210" stroke="#2a1a0e" stroke-width="1.25"/>
  <text class="l" x="514" y="270" text-anchor="middle">pilot, measuring an</text>
  <text class="l" x="514" y="285" text-anchor="middle">unassisted endpoint</text>
  <line x1="300" y1="256" x2="300" y2="288" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="s" x="288" y="276" text-anchor="end">no</text>

  <!-- asymmetry node -->
  <rect x="266" y="290" width="68" height="62" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="300" y1="308" x2="300" y2="342" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="290" y1="342" x2="310" y2="342" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="278" y1="306" x2="322" y2="322" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="278" y1="306" x2="278" y2="314" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="272" y1="314" x2="284" y2="314" stroke="#2a1a0e" stroke-width="1.25"/>
  <line x1="322" y1="322" x2="322" y2="334" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="316" y1="334" x2="328" y2="334" stroke="#2a1a0e" stroke-width="1.25"/>
  <text class="s" x="348" y="312">risk-asymmetry tiebreak:</text>
  <text class="s" x="348" y="326">compounding, irreversible harm</text>
  <text class="s" x="348" y="340">outweighs cheap foregone convenience</text>

  <!-- decline: flat stop bar, not an arrowhead -->
  <line x1="300" y1="352" x2="300" y2="390" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="268" y1="390" x2="332" y2="390" stroke="#2a1a0e" stroke-width="3"/>
  <text class="l" x="300" y="410" text-anchor="middle">decline</text>

  <text class="s" x="32" y="442">Two evidence gates, then a tiebreak: where both gates fail and harm is unmeasurable on pilot timescales, risk asymmetry</text>
  <text class="s" x="32" y="457">flips the burden of proof onto the feature. The flat bar (&#8867;) marks a block, not a route &#8212; no re-entry loop is promised.</text>
</svg>
