  <title id="fig-title-14-01">The four-endpoint architecture: where each measurement lives — 14-evaluating-ai-mediated-learning</title>
  <desc>A presence field marks where the AI is available; a dashed withdrawal threshold bounds it. The assisted marker stands inside the field; the primary unassisted marker stands just across the threshold; transfer stands on a novel pentagon pedestal; retention sits at the end of a dotted delay track. Time runs left to right. Satisfaction appears nowhere.</desc>
