  <!-- caption -->
  <text x="64" y="412" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">When the Wisconsin Dropout Early Warning System flagged a student as unlikely to graduate on time, the prediction</text>
  <text x="64" y="426" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">was wrong about 74% of the time. The false alarms fell disproportionately on Black and Hispanic students; the chapter</text>
  <text x="64" y="440" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">reports the direction of that skew only — no published magnitude — so the array is deliberately not subdivided.</text>
