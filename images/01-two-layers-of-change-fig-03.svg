  <!-- Caption -->
  <text x="32" y="384" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">One decision, two exits, run feature-by-feature; neither branch is preferred.</text>
  <text x="32" y="400" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">"Both layers" cases are handled by running the diagnostic per feature — never by a third path.</text>
